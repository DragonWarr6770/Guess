<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Price Guess Game</title>
<link rel="manifest" href="./manifest.json">
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f9d423, #ff4e50);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  #game-container {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  h1 {
    margin-bottom: 20px;
    color: #333;
  }
  input[type="number"] {
    padding: 10px;
    font-size: 1em;
    width: 80%;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }
  button {
    padding: 10px 20px;
    font-size: 1em;
    border: none;
    border-radius: 8px;
    background-color: #007bff;
    color: white;
    cursor: pointer;
    margin-bottom: 15px;
  }
  button:hover {
    background-color: #0056b3;
  }
  #result {
    font-size: 1.2em;
    margin-top: 15px;
    min-height: 1.2em;
  }
</style>
</head>
<body>
<div id="game-container">
  <h1>Guess the Price!</h1>
  <p>Try to guess the hidden number between 1 and 100.</p>
  <input type="number" id="guess" placeholder="Enter your guess" min="1" max="100"/>
  <br />
  <button onclick="checkGuess()">Guess</button>
  <div id="result"></div>
</div>

<script>
let secretNumber = Math.floor(Math.random() * 100) + 1;
let attempts = 0;

function checkGuess() {
  const guessInput = document.getElementById('guess');
  const guess = Number(guessInput.value);
  const resultDiv = document.getElementById('result');

  if (!guess || guess < 1 || guess > 100) {
    resultDiv.textContent = "Please enter a number between 1 and 100.";
    return;
  }

  attempts++;
  if (guess === secretNumber) {
    resultDiv.textContent = `Congratulations! You guessed it in ${attempts} attempts!`;
    // Reset game after win
    secretNumber = Math.floor(Math.random() * 100) + 1;
    attempts = 0;
  } else if (guess < secretNumber) {
    resultDiv.textContent = "Try higher!";
  } else {
    resultDiv.textContent = "Try lower!";
  }
  guessInput.value = "";
}
</script>
</body>
</html>
